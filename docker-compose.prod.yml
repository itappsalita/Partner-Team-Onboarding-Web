version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onboarding-app-prod
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads

  db:
    image: mysql:8.0
    container_name: onboarding-db-prod
    restart: always
    environment:
      - MYSQL_DATABASE=partner_onboarding_db
      - MYSQL_ROOT_PASSWORD=password_prod
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-ppassword_prod",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Management service for DB migrations and seeding
  # This container is only run manually when needed
  migration:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder # Use the builder stage which contains all devDependencies
    container_name: onboarding-migration
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    profiles:
      - migration # This ensures it doesn't start automatically with 'up'

volumes:
  mysql_data_prod:
