name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, production]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /var/www/Partner-Team-Onboarding-Web
          git fetch origin
          git reset --hard origin/main
          docker compose -f docker-compose.prod.yml up -d --build
          docker compose -f docker-compose.prod.yml --profile migration run --rm migration sh -c "npm run db:generate && npm run db:migrate"
          docker image prune -f
